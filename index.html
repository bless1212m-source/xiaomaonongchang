<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小猫农场 · 星露谷风格 · 塑料袋 & 钢镚</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', '微软雅黑', 'Press Start 2P', cursive, monospace;
            margin: 0;
            padding: 16px;
            touch-action: pan-x pan-y; /* 保留垂直滚动，但游戏内按钮会阻止 */
        }

        .game-container {
            background: #5a3e2b;
            padding: 16px 18px 20px 18px;
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.3);
            max-width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            width: 100%;
            height: auto;
            background: #cbe9ff;
            cursor: pointer;
        }

        /* 信息栏 */
        .info-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #fdf8e7;
            padding: 8px 16px;
            margin-top: 14px;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.2);
            gap: 10px;
        }

        .fish-count {
            background: #ffecb3;
            padding: 4px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            color: #c45c1a;
        }
        .fish-count span {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff7e33;
        }

        .cat-status {
            display: flex;
            gap: 16px;
            background: #e9dbbd;
            padding: 4px 16px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .cat-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            background: white;
            padding: 4px 12px;
            border-radius: 32px;
        }
        .hearts {
            color: #ff4d6d;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        /* 触控按钮面板 */
        .touch-controls {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 80px;
        }
        .dpad-btn {
            background: #2c2b26;
            border: none;
            border-radius: 40px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffcd7e;
            box-shadow: 0 4px 0 #15130f;
            transition: 0.05s linear;
            touch-action: manipulation;
            cursor: pointer;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #15130f;
        }
        .empty {
            background: transparent;
            box-shadow: none;
            pointer-events: none;
        }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .action-btn {
            background: #ffcd7e;
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a2c14;
            box-shadow: 0 4px 0 #aa7c44;
            transition: 0.05s linear;
            touch-action: manipulation;
            cursor: pointer;
            min-width: 100px;
            text-align: center;
            font-family: '微软雅黑', monospace;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #aa7c44;
        }
        @media (max-width: 700px) {
            .dpad { grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 6px; }
            .dpad-btn { font-size: 1.8rem; }
            .action-btn { padding: 8px 14px; font-size: 1rem; min-width: 75px; }
            .cat-badge { font-size: 0.75rem; }
            .hearts { font-size: 0.8rem; }
        }
        .victory-badge {
            background: gold;
            color: #b45f1b;
            padding: 4px 12px;
            border-radius: 32px;
            font-weight: bold;
            font-size: 0.9rem;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); background: #ffd966;}
            100% { transform: scale(1.02); background: #ffb347;}
        }
        .msg-area {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: #fff3cf;
            text-shadow: 1px 1px 0 #3a280f;
            min-height: 40px;
            font-size: 0.8rem;
            padding: 0 6px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="info-panel">
            <div class="fish-count">🐟 小鱼干 <span id="fishAmount">0</span></div>
            <div class="cat-status">
                <div class="cat-badge">🐱 塑料袋 <span id="calicoHearts" class="hearts">💛💛💛💛💛</span></div>
                <div class="cat-badge">🐈‍⬛ 钢镚 <span id="silverHearts" class="hearts">💛💛💛💛💛</span></div>
            </div>
        </div>

        <!-- 手机触控按钮区域 -->
        <div class="touch-controls">
            <div class="dpad">
                <div></div>
                <button class="dpad-btn" data-dir="up">▲</button>
                <div></div>
                <button class="dpad-btn" data-dir="left">◀</button>
                <button class="dpad-btn" data-dir="down">▼</button>
                <button class="dpad-btn" data-dir="right">▶</button>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="btn-talk">💬 对话</button>
                <button class="action-btn" id="btn-feed">🐟 喂鱼</button>
                <button class="action-btn" id="btn-outfit">👗 换装</button>
            </div>
        </div>
        <div id="gameMessage" class="msg-area"></div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 固定尺寸 900x600 (内部逻辑不变)
        const W = 900, H = 600;
        const SKY = '#b8e1fc';
        const GRASS = '#6fbf4c';
        const DIRT_PATH = '#c9a87b';

        // ----- 玩家 (精致星露谷小女孩) -----
        let player = {
            x: W/2 - 18,
            y: H - 110,
            w: 32,
            h: 44,
            speed: 4.2,
            outfit: 0      // 0: 粉色裙子, 1: 绿色衣裤
        };

        // ----- 猫咪 (三花=塑料袋，银渐层=钢镚) -----
        const MAX_HAPPY = 5;
        let cats = [
            { name: '塑料袋', type: 'calico', x: 220, y: 380, w: 40, h: 38,
              happiness: 0, vx: 0.6, vy: -0.4, talkMsg: '喵呜～给我小鱼干嘛？' },
            { name: '钢镚', type: 'silver', x: 640, y: 420, w: 40, h: 38,
              happiness: 0, vx: -0.5, vy: 0.3, talkMsg: '呼噜噜～银闪闪的小鱼干！' }
        ];

        // 鱼干系统
        let fishItems = [];
        const FISH_COUNT_MAX = 3;
        let playerFish = 0;

        // 交互状态
        let showDialog = false;
        let dialogText = '';
        let dialogTimeout = null;
        let floatingMsg = '';
        let msgTimer = null;
        let victoryFlag = false;
        let nearCatIndex = -1;

        // 移动控制 (键盘+触摸共用)
        const moveState = { up: false, down: false, left: false, right: false };

        // ---------- 辅助函数 ----------
        function updateUI() {
            document.getElementById('fishAmount').innerText = playerFish;
            const calico = cats[0];
            const silver = cats[1];
            function getHearts(val) {
                let full = '❤️'.repeat(val);
                let empty = '🖤'.repeat(MAX_HAPPY - val);
                return full + empty;
            }
            document.getElementById('calicoHearts').innerHTML = getHearts(calico.happiness);
            document.getElementById('silverHearts').innerHTML = getHearts(silver.happiness);
            
            if(!victoryFlag && calico.happiness >= MAX_HAPPY && silver.happiness >= MAX_HAPPY){
                victoryFlag = true;
                showFloatingMessage('🎉 大胜利！ 🎉 塑料袋和钢镚都超爱你！农场幸福喵！ 🎉', 4000);
            }
            let msgDiv = document.getElementById('gameMessage');
            if(victoryFlag){
                if(!document.querySelector('.victory-badge')){
                    const vicDiv = document.createElement('div');
                    vicDiv.className = 'victory-badge';
                    vicDiv.innerText = '✨ 完美农场 ✨';
                    document.querySelector('.info-panel').appendChild(vicDiv);
                }
            } else {
                let oldVic = document.querySelector('.victory-badge');
                if(oldVic) oldVic.remove();
            }
        }
        
        function showFloatingMessage(msg, duration = 1800){
            floatingMsg = msg;
            if(msgTimer) clearTimeout(msgTimer);
            msgTimer = setTimeout(() => { floatingMsg = ''; }, duration);
            let msgDiv = document.getElementById('gameMessage');
            msgDiv.innerText = msg;
            setTimeout(() => { if(msgDiv.innerText === msg) msgDiv.innerText = ''; }, duration);
        }
        
        function setDialog(msg, autoClear = true){
            if(dialogTimeout) clearTimeout(dialogTimeout);
            dialogText = msg;
            showDialog = true;
            if(autoClear){
                dialogTimeout = setTimeout(() => {
                    showDialog = false;
                    dialogText = '';
                }, 2800);
            }
        }
        
        // 物品生成
        function isOverlapWithEntity(x, y, w=18, h=18){
            if(x < player.x+player.w && x+w > player.x && y < player.y+player.h && y+h > player.y) return true;
            for(let cat of cats){
                if(x < cat.x+cat.w && x+w > cat.x && y < cat.y+cat.h && y+h > cat.y) return true;
            }
            for(let fish of fishItems){
                if(Math.abs(fish.x - x) < 22 && Math.abs(fish.y - y) < 22) return true;
            }
            return false;
        }
        
        function getRandomFishPos(){
            for(let i=0;i<50;i++){
                let rx = 20 + Math.random() * (W - 50);
                let ry = 40 + Math.random() * (H - 90);
                if(!isOverlapWithEntity(rx, ry, 20, 20)) return {x: rx, y: ry};
            }
            return {x: 150 + Math.random()*600, y: 200 + Math.random()*300};
        }
        
        function initFishItems(){
            fishItems = [];
            for(let i=0;i<FISH_COUNT_MAX;i++){
                let pos = getRandomFishPos();
                fishItems.push({ x: pos.x, y: pos.y, w: 20, h: 18 });
            }
        }
        
        function tryPickFish(){
            for(let i=0;i<fishItems.length;i++){
                const fish = fishItems[i];
                if(player.x < fish.x+fish.w && player.x+player.w > fish.x &&
                   player.y < fish.y+fish.h && player.y+player.h > fish.y){
                    fishItems.splice(i,1);
                    playerFish++;
                    updateUI();
                    showFloatingMessage('+🐟 小鱼干', 700);
                    let newPos = getRandomFishPos();
                    fishItems.push({ x: newPos.x, y: newPos.y, w: 20, h: 18 });
                    break;
                }
            }
        }
        
        function feedNearestCat(){
            if(victoryFlag){
                showFloatingMessage('✨ 完美结局！小猫们超幸福 ✨', 1200);
                return;
            }
            if(nearCatIndex === -1){
                showFloatingMessage('🐾 靠近一只小猫才能喂食哟～', 1000);
                return;
            }
            const cat = cats[nearCatIndex];
            if(playerFish <= 0){
                showFloatingMessage('😿 没有小鱼干！去草地捡一些吧！', 1200);
                return;
            }
            if(cat.happiness >= MAX_HAPPY){
                showFloatingMessage(`${cat.name} 已经很饱很开心了！💖`, 1200);
                return;
            }
            playerFish--;
            cat.happiness = Math.min(MAX_HAPPY, cat.happiness+1);
            updateUI();
            showFloatingMessage(`🍣 喂给${cat.name}小鱼干 +1好感！ 🐱❤️`, 1500);
            setDialog(`${cat.name}：「喵呜～超好吃的！❤️」`, 1500);
            if(cats[0].happiness>=MAX_HAPPY && cats[1].happiness>=MAX_HAPPY && !victoryFlag){
                victoryFlag = true;
                updateUI();
                setDialog('🎉 农场之王！两只小猫都成了你的挚友！ 🎉', 3000);
            }
        }
        
        function updateNearCat(){
            let minDist = 65;
            let closest = -1;
            for(let i=0;i<cats.length;i++){
                const cat = cats[i];
                const dx = (player.x+player.w/2) - (cat.x+cat.w/2);
                const dy = (player.y+player.h/2) - (cat.y+cat.h/2);
                const dist = Math.hypot(dx,dy);
                if(dist < minDist){
                    minDist = dist;
                    closest = i;
                }
            }
            nearCatIndex = closest;
        }
        
        function interactTalk(){
            if(nearCatIndex !== -1){
                const cat = cats[nearCatIndex];
                let happyText = '';
                if(cat.happiness === 0) happyText = ' (还不熟悉你)';
                else if(cat.happiness < 3) happyText = ' (有点喜欢你)';
                else if(cat.happiness >= MAX_HAPPY) happyText = ' (超级黏你！)';
                else happyText = ' (咕噜咕噜很开心)';
                const msg = `${cat.name}：「${cat.talkMsg}」${happyText} 好感:${cat.happiness}/${MAX_HAPPY}`;
                setDialog(msg);
            } else {
                setDialog('🐣 靠近小猫按对话，按喂鱼按钮～ 按换装可以换衣服✨', 1800);
            }
        }
        
        function toggleOutfit() {
            player.outfit = player.outfit === 0 ? 1 : 0;
            const outfitName = player.outfit === 0 ? '✨ 粉色小裙子 ✨' : '🌿 绿色背带裤 🌿';
            showFloatingMessage(`👗 ${outfitName}`, 1200);
        }
        
        // 猫咪移动
        function updateCats(){
            for(let cat of cats){
                if(Math.random() < 0.02){
                    cat.vx += (Math.random() - 0.5) * 0.8;
                    cat.vy += (Math.random() - 0.5) * 0.8;
                    let maxSp = 1.5;
                    cat.vx = Math.min(maxSp, Math.max(-maxSp, cat.vx));
                    cat.vy = Math.min(maxSp, Math.max(-maxSp, cat.vy));
                }
                cat.x += cat.vx;
                cat.y += cat.vy;
                if(cat.x <= 5) { cat.x = 5; cat.vx = Math.abs(cat.vx)*0.6; }
                if(cat.x + cat.w >= W-5) { cat.x = W-5-cat.w; cat.vx = -Math.abs(cat.vx)*0.6; }
                if(cat.y <= 40) { cat.y = 40; cat.vy = Math.abs(cat.vy)*0.6; }
                if(cat.y + cat.h >= H-35) { cat.y = H-35-cat.h; cat.vy = -Math.abs(cat.vy)*0.6; }
                cat.vx *= 0.99;
                cat.vy *= 0.99;
                if(Math.abs(cat.vx) < 0.1 && Math.random()<0.05) cat.vx += (Math.random()-0.5)*0.6;
                if(Math.abs(cat.vy) < 0.1 && Math.random()<0.05) cat.vy += (Math.random()-0.5)*0.6;
            }
        }
        
        // ------------------- 精致人物绘制 (星露谷升级版) -------------------
        function drawPlayer() {
            const x = player.x, y = player.y, w = player.w, h = player.h;
            // 头部 (圆润)
            ctx.fillStyle = '#FCE5C4';
            ctx.beginPath();
            ctx.ellipse(x + w/2, y + 13, 13.5, 14.5, 0, 0, Math.PI*2);
            ctx.fill();
            // 头发 (双丸子头+刘海)
            ctx.fillStyle = '#B97C44';
            // 刘海
            ctx.fillRect(x + 6, y + 6, 20, 8);
            // 左丸子
            ctx.beginPath();
            ctx.ellipse(x + 8, y + 3, 6, 7, -0.2, 0, Math.PI*2);
            ctx.fill();
            // 右丸子
            ctx.beginPath();
            ctx.ellipse(x + w - 8, y + 3, 6, 7, 0.2, 0, Math.PI*2);
            ctx.fill();
            // 头发高光
            ctx.fillStyle = '#DEA56C';
            ctx.beginPath();
            ctx.ellipse(x + 7, y + 2, 2, 2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w - 7, y + 2, 2, 2, 0, 0, Math.PI*2);
            ctx.fill();
            
            // 大眼睛 (水汪汪)
            ctx.fillStyle = '#2F241F';
            ctx.fillRect(x + 8, y + 14, 5, 7);
            ctx.fillRect(x + w - 13, y + 14, 5, 7);
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(x + 9, y + 13, 2, 3);
            ctx.fillRect(x + w - 12, y + 13, 2, 3);
            ctx.fillStyle = '#A5673F';
            ctx.fillRect(x + 10, y + 16, 1, 2);
            ctx.fillRect(x + w - 11, y + 16, 1, 2);
            
            // 腮红 + 微笑
            ctx.fillStyle = '#FFB7B7';
            ctx.beginPath();
            ctx.ellipse(x + 5, y + 21, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w - 5, y + 21, 3, 2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.strokeStyle = '#7A4A2A';
            ctx.lineWidth = 1.5;
            ctx.arc(x + w/2, y + 25, 5, 0.1, Math.PI - 0.1);
            ctx.stroke();
            
            // 衣服 (精细版)
            if (player.outfit === 0) {
                // 粉色连衣裙 + 小围裙
                ctx.fillStyle = '#F9B7B0';
                ctx.fillRect(x + 5, y + 28, w - 10, 18);
                ctx.fillStyle = '#F58C7A';
                ctx.fillRect(x + 4, y + 30, w - 8, 12);
                // 领结
                ctx.fillStyle = '#D96C4A';
                ctx.beginPath();
                ctx.moveTo(x + w/2, y + 29);
                ctx.lineTo(x + w/2 - 6, y + 34);
                ctx.lineTo(x + w/2, y + 38);
                ctx.lineTo(x + w/2 + 6, y + 34);
                ctx.fill();
                // 裙摆花边
                ctx.fillStyle = '#F9C6B5';
                for(let i=0; i<4; i++) ctx.fillRect(x + 6 + i*6, y + 43, 4, 3);
                // 小爱心纽扣
                ctx.fillStyle = '#FF99AA';
                ctx.fillRect(x + w/2 - 2, y + 35, 4, 4);
            } else {
                // 绿色上衣 + 背带裤 (精致)
                ctx.fillStyle = '#7CB518';
                ctx.fillRect(x + 5, y + 28, w - 10, 14);
                ctx.fillStyle = '#4F6D2A';
                ctx.fillRect(x + 4, y + 30, w - 8, 8);
                // 背带
                ctx.fillStyle = '#C99E6F';
                ctx.fillRect(x + 8, y + 28, 5, 14);
                ctx.fillRect(x + w - 13, y + 28, 5, 14);
                // 裤子
                ctx.fillStyle = '#3C5E1F';
                ctx.fillRect(x + 4, y + 40, w - 8, 9);
                // 大口袋
                ctx.fillStyle = '#AB8A4A';
                ctx.fillRect(x + w/2 - 6, y + 45, 12, 6);
                ctx.fillStyle = '#F7D44A';
                ctx.fillRect(x + w/2 - 4, y + 46, 2, 3);
                // 腰带
                ctx.fillStyle = '#AA7A3C';
                ctx.fillRect(x + 6, y + 37, w - 12, 3);
            }
            // 鞋子
            ctx.fillStyle = '#7A5A3A';
            ctx.fillRect(x + 6, y + 49, 7, 4);
            ctx.fillRect(x + w - 13, y + 49, 7, 4);
            // 小草帽装饰
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(x + 2, y - 3, w - 4, 6);
            ctx.fillStyle = '#F4C98E';
            ctx.fillRect(x + 4, y - 2, w - 8, 5);
            // 帽顶小绒球
            ctx.fillStyle = '#E5A95C';
            ctx.beginPath();
            ctx.arc(x + w/2, y - 2, 4, 0, Math.PI*2);
            ctx.fill();
        }
        
        // ---------- 精美猫咪绘制 (保持原有精细并微调) ----------
        function drawCat(cat) {
            const x = cat.x, y = cat.y, w = cat.w, h = cat.h;
            ctx.fillStyle = cat.type === 'calico' ? '#FBE6B0' : '#E8E8E8';
            ctx.beginPath();
            ctx.ellipse(x+w/2, y+h/2, w/2.2, h/2.3, 0, 0, Math.PI*2);
            ctx.fill();
            if(cat.type === 'calico') {
                ctx.fillStyle = '#C25D2B';
                ctx.beginPath(); ctx.ellipse(x+10, y+12, 7, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#4F2D1F';
                ctx.beginPath(); ctx.ellipse(x+28, y+16, 6, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#E58C3A';
                ctx.fillRect(x+18, y+24, 9, 7);
                ctx.fillStyle = '#E58C3A';
                ctx.beginPath(); ctx.ellipse(x+22, y+8, 5, 4, 0, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = '#9E9E9E';
                for(let i=0;i<4;i++) ctx.fillRect(x+6 + i*7, y+12, 3, 9);
                ctx.fillStyle = '#B0B0B0';
                ctx.fillRect(x+12, y+22, 6, 6); ctx.fillRect(x+24, y+22, 6, 6);
                ctx.fillStyle = '#7A7A7A';
                ctx.fillRect(x+14, y+6, 12, 5);
            }
            // 耳朵
            ctx.fillStyle = cat.type === 'calico' ? '#E6BC84' : '#B0B0B0';
            ctx.beginPath(); ctx.moveTo(x+8, y-2); ctx.lineTo(x+18, y-14); ctx.lineTo(x+28, y-2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x+w-8, y-2); ctx.lineTo(x+w-18, y-14); ctx.lineTo(x+w-28, y-2); ctx.fill();
            // 五官
            ctx.fillStyle = '#2F241F';
            ctx.fillRect(x+10, y+18, 4, 5); ctx.fillRect(x+26, y+18, 4, 5);
            ctx.fillStyle = '#E47E5A';
            ctx.beginPath(); ctx.arc(x+20, y+28, 5, 0, Math.PI, false); ctx.fill();
            ctx.beginPath(); ctx.strokeStyle = '#5E5B56'; ctx.lineWidth=1.2;
            ctx.moveTo(x+8, y+22); ctx.lineTo(x-4, y+20);
            ctx.moveTo(x+8, y+26); ctx.lineTo(x-4, y+26);
            ctx.moveTo(x+w-8, y+22); ctx.lineTo(x+w+4, y+20);
            ctx.moveTo(x+w-8, y+26); ctx.lineTo(x+w+4, y+26);
            ctx.stroke();
            if(cat.happiness >= 4){
                ctx.fillStyle = '#FF5E7E'; ctx.font = "18px 'Segoe UI'"; ctx.fillText("❤️", x+28, y-4);
            } else if(cat.happiness >= 2){
                ctx.fillStyle = '#FF9F7A'; ctx.font = "14px monospace"; ctx.fillText("♡", x+30, y-2);
            }
        }
        
        function drawFishItems() {
            for(let fish of fishItems){
                ctx.fillStyle = '#FF9F4B';
                ctx.beginPath(); ctx.ellipse(fish.x+10, fish.y+9, 10, 7, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#E07A2C';
                ctx.beginPath(); ctx.moveTo(fish.x+16, fish.y+6); ctx.lineTo(fish.x+24, fish.y+4); ctx.lineTo(fish.x+20, fish.y+12); ctx.fill();
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath(); ctx.arc(fish.x+6, fish.y+7, 2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#2F221B';
                ctx.beginPath(); ctx.arc(fish.x+5, fish.y+6, 0.8, 0, Math.PI*2); ctx.fill();
            }
        }
        
        function drawBackground() {
            const grad = ctx.createLinearGradient(0,0,0,300);
            grad.addColorStop(0,'#cbe9ff'); grad.addColorStop(1,'#9ec9e0');
            ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
            ctx.fillStyle = '#fff9e8';
            ctx.beginPath(); ctx.ellipse(120,70,45,35,0,0,Math.PI*2); ctx.ellipse(170,55,50,40,0,0,Math.PI*2); ctx.ellipse(210,80,40,30,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(740,90,50,35,0,0,Math.PI*2); ctx.ellipse(790,70,45,38,0,0,Math.PI*2); ctx.ellipse(830,95,40,30,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = GRASS; ctx.fillRect(0, H-140, W, 150);
            ctx.fillStyle = '#7fb05c';
            for(let i=0;i<40;i++){ ctx.beginPath(); ctx.moveTo(i*35, H-140); ctx.lineTo(i*35+15, H-160); ctx.lineTo(i*35-15, H-160); ctx.fill(); }
            ctx.fillStyle = DIRT_PATH; ctx.fillRect(0, H-80, W, 28);
            ctx.fillStyle = '#b87c4f';
            for(let i=0;i<12;i++) ctx.fillRect(40+i*70, H-77, 12, 18);
        }
        
        function drawUIandMessages() {
            if(nearCatIndex !== -1 && !victoryFlag){
                ctx.font = "bold 16px 'Segoe UI'"; ctx.fillStyle = "#ffffff"; ctx.shadowBlur = 3;
                ctx.fillText("💡 按 [🐟喂鱼] 按钮", player.x-5, player.y-15);
                ctx.fillStyle = "#ffdd99"; ctx.fillText("🐟", player.x+55, player.y-18);
                ctx.shadowBlur = 0;
            }
            if(showDialog && dialogText){
                ctx.fillStyle = '#2e241fcc'; ctx.fillRect(40, H-110, W-80, 70);
                ctx.fillStyle = '#fff3e0'; ctx.font = "18px '微软雅黑'"; ctx.fillText(dialogText, 65, H-65);
                ctx.fillStyle = '#d9b48b'; ctx.font = "13px monospace"; ctx.fillText("✨ 点击对话按钮继续", W-200, H-45);
            }
            if(floatingMsg){
                ctx.font = "bold 20px 'Segoe UI'"; ctx.fillStyle = "#fff3aa";
                ctx.fillText(floatingMsg, W/2-ctx.measureText(floatingMsg).width/2, 70);
            }
            if(victoryFlag){
                ctx.font = "bold 20 monospace"; ctx.fillStyle = "#FFD966"; ctx.fillText("🏆 完美结局 🏆", W-150, 45);
            }
        }
        
        // 移动更新 (根据moveState)
        function updateMovement() {
            let moveX = 0, moveY = 0;
            if(moveState.up) moveY -= 1;
            if(moveState.down) moveY += 1;
            if(moveState.left) moveX -= 1;
            if(moveState.right) moveX += 1;
            if(moveX !==0 || moveY !==0){
                const len = Math.hypot(moveX,moveY);
                moveX = moveX/len * player.speed;
                moveY = moveY/len * player.speed;
            }
            let newX = player.x + moveX, newY = player.y + moveY;
            player.x = Math.min(Math.max(2, newX), W - player.w - 2);
            player.y = Math.min(Math.max(35, newY), H - player.h - 20);
        }
        
        // ---------- 触摸按钮绑定 ----------
        function initTouchControls() {
            const dirBtns = {
                up: document.querySelector('[data-dir="up"]'),
                down: document.querySelector('[data-dir="down"]'),
                left: document.querySelector('[data-dir="left"]'),
                right: document.querySelector('[data-dir="right"]')
            };
            const setDir = (dir, state) => { if(moveState.hasOwnProperty(dir)) moveState[dir] = state; };
            const handleStart = (dir) => (e) => { e.preventDefault(); setDir(dir, true); };
            const handleEnd = (dir) => (e) => { e.preventDefault(); setDir(dir, false); };
            for(let [dir, btn] of Object.entries(dirBtns)){
                if(btn){
                    btn.addEventListener('touchstart', handleStart(dir), {passive: false});
                    btn.addEventListener('touchend', handleEnd(dir));
                    btn.addEventListener('mousedown', handleStart(dir));
                    btn.addEventListener('mouseup', handleEnd(dir));
                    // 防止鼠标离开按钮时卡方向
                    btn.addEventListener('mouseleave', handleEnd(dir));
                }
            }
            // 动作按钮
            document.getElementById('btn-talk').addEventListener('click', (e) => { e.preventDefault(); interactTalk(); });
            document.getElementById('btn-feed').addEventListener('click', (e) => { e.preventDefault(); feedNearestCat(); });
            document.getElementById('btn-outfit').addEventListener('click', (e) => { e.preventDefault(); toggleOutfit(); });
        }
        
        // 游戏主循环
        function gameLoop() {
            updateMovement();
            updateCats();
            tryPickFish();
            updateNearCat();
            
            drawBackground();
            drawFishItems();
            drawCat(cats[0]);
            drawCat(cats[1]);
            drawPlayer();
            drawUIandMessages();
            
            requestAnimationFrame(gameLoop);
        }
        
        function init() {
            player.x = 380; player.y = 480;
            cats[0].x = 200; cats[0].y = 400; cats[0].vx = 0.5; cats[0].vy = -0.2;
            cats[1].x = 650; cats[1].y = 430; cats[1].vx = -0.4; cats[1].vy = 0.3;
            cats[0].happiness = 0; cats[1].happiness = 0;
            playerFish = 2;
            victoryFlag = false;
            initFishItems();
            updateUI();
            showFloatingMessage('🐱 触摸方向键移动，喂鱼干提升好感～', 2500);
            initTouchControls();
            gameLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
